name: Build Hiking Watch APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ──────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Install Gradle 8.11.1 + generate wrapper ──────────────────
      #    AGP 8.7.x requires Gradle 8.9+. We use 8.11.1 (latest stable).
      - name: Install Gradle and generate wrapper
        run: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.11.1
          sdk use gradle 8.11.1
          gradle wrapper --gradle-version 8.11.1 --distribution-type bin
          chmod +x ./gradlew
          echo "Gradle version:"
          ./gradlew --version

      # ── 5. Cache Gradle ──────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ───────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt
          echo ""
          echo "====== KEY ERRORS ======"
          grep -E "^e: |error:|FAILED|Unresolved|minSdk|compileSdk|minCompileSdk" build_log.txt | head -40 || true
          echo "========================"
          grep -q "BUILD SUCCESSFUL" build_log.txt || exit 1

      # ── 7. Upload Debug APK ──────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HikingWatch-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Build Release APK ─────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace 2>&1

      # ── 9. Upload Release APK ────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HikingWatch-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 10. List APK files ───────────────────────────────────────────
      - name: List APK files
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
