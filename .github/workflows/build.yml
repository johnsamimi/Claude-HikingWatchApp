name: Build Hiking Watch APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Check out the code ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Android SDK ───────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Install Gradle 8.6 via SDKMAN and generate wrapper ──────────
      #    This step creates gradlew and gradle-wrapper.jar from scratch
      #    so the repo does NOT need to contain those files.
      - name: Install Gradle and generate Gradle Wrapper
        run: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.6
          sdk use gradle 8.6
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x ./gradlew
          echo "✅ gradlew generated successfully"
          ls -lh gradlew gradle/wrapper/

      # ── 5. Cache Gradle dependencies ────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ──────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1

      # ── 7. Upload Debug APK ─────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HikingWatch-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Build Release APK (unsigned) ────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace 2>&1

      # ── 9. Upload Release APK ──────────────────────────────────────────
      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: HikingWatch-Release-APK-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 10. Show generated APK files ────────────────────────────────────
      - name: List generated APK files
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
