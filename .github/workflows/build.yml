name: Build Hiking Watch APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.6 and generate wrapper
        run: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.6
          sdk use gradle 8.6
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt
          echo "====== KEY ERRORS ======"
          grep -E "^e: |error:|FAILED|Unresolved|minCompileSdk" build_log.txt | head -30 || true
          echo "========================"
          grep -q "BUILD SUCCESSFUL" build_log.txt || exit 1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HikingWatch-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace 2>&1

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HikingWatch-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: List APK files
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
